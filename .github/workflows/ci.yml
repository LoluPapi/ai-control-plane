name: ci

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest -q
      # The eval/demo sequence is a blocking gate, same as the unit tests.
      - run: python -m control_plane.cli presentation

  publish-image:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # amd64 for cloud, arm64 for Apple Silicon / ARM node pools.
          platforms: linux/amd64,linux/arm64
          # Provenance attestation for supply-chain verification downstream.
          provenance: true
          tags: |
            ghcr.io/lolupapi/ai-control-plane:latest
            ghcr.io/lolupapi/ai-control-plane:${{ github.sha }}
